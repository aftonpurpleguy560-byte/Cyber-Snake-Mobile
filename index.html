<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Snake Mobile v4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; touch-action: none; overflow: hidden; }
        .neon-border { border: 2px solid #bc13fe; box-shadow: 0 0 15px #bc13fe; }
        .neon-text { text-shadow: 0 0 10px #bc13fe; color: #e0aaff; }
        canvas { background: radial-gradient(circle, #1a1a2e 0%, #050505 100%); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen font-sans">

    <div class="mb-2 text-center">
        <h1 class="text-3xl font-black neon-text italic uppercase tracking-tighter">Cyber Snake</h1>
        <p class="text-green-400 font-mono text-xl">Score: <span id="score">0</span></p>
    </div>

    <div class="relative rounded-lg neon-border overflow-hidden">
        <canvas id="gameCanvas" width="360" height="360"></canvas>
        <div id="gameOverScreen" class="hidden absolute inset-0 bg-black/90 flex flex-col items-center justify-center backdrop-blur-md">
            <h2 class="text-4xl font-bold text-red-500 mb-4">GAME OVER</h2>
            <button onclick="resetGame()" class="px-8 py-3 bg-purple-600 text-white rounded-full font-bold shadow-lg active:scale-95">RESTART</button>
        </div>
    </div>

    <div class="mt-6 grid grid-cols-3 gap-3">
        <div></div>
        <button onclick="changeDir(0, -1)" class="w-16 h-16 bg-purple-900/40 border border-purple-500/50 rounded-2xl flex items-center justify-center text-3xl text-white active:bg-purple-600 transition-colors">▲</button>
        <div></div>
        <button onclick="changeDir(-1, 0)" class="w-16 h-16 bg-purple-900/40 border border-purple-500/50 rounded-2xl flex items-center justify-center text-3xl text-white active:bg-purple-600">◀</button>
        <button onclick="changeDir(0, 1)" class="w-16 h-16 bg-purple-900/40 border border-purple-500/50 rounded-2xl flex items-center justify-center text-3xl text-white active:bg-purple-600">▼</button>
        <button onclick="changeDir(1, 0)" class="w-16 h-16 bg-purple-900/40 border border-purple-500/50 rounded-2xl flex items-center justify-center text-3xl text-white active:bg-purple-600">▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gridSize = 18;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5, type: '🍎', score: 1};
        let dx = 0, dy = 0;
        let score = 0;
        let gameRunning = true;

        const FOODS = [
            {t:'🍎', s:1, c:0.3}, {t:'🍐', s:2, c:0.1}, {t:'🍊', s:2, c:0.1}, {t:'🍋', s:3, c:0.05},
            {t:'🍌', s:2, c:0.1}, {t:'🍉', s:4, c:0.05}, {t:'🍇', s:3, c:0.05}, {t:'🍓', s:5, c:0.03},
            {t:'🍒', s:5, c:0.03}, {t:'🍍', s:6, c:0.02}, {t:'🥝', s:4, c:0.04}, {t:'🍅', s:2, c:0.1},
            {t:'🥑', s:7, c:0.02}, {t:'🍆', s:3, c:0.05}, {t:'🥔', s:1, c:0.1}, {t:'🥕', s:2, c:0.1},
            {t:'🌽', s:3, c:0.05}, {t:'🌶️', s:10, c:0.01}, {t:'⭐', s:15, c:0.01}, {t:'💎', s:25, c:0.005}
        ];

        const eatSound = new Howl({ src: ['https://assets.mixkit.co/active_storage/sfx/2001/2001-preview.mp3'] });
        const overSound = new Howl({ src: ['https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3'] });

        function draw() {
            if (!gameRunning) return;
            
            // Hareket
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if (dx !== 0 || dy !== 0) {
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(s => s.x === head.x && s.y === head.y)) {
                    gameOver();
                    return;
                }
                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score += food.score;
                    scoreEl.innerText = score;
                    eatSound.play();
                    spawnFood();
                } else {
                    snake.pop();
                }
            }

            // Çizim
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Yılan
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ff00';
            ctx.fillStyle = '#00ff00';
            snake.forEach((p, i) => {
                ctx.fillRect(p.x * gridSize, p.y * gridSize, gridSize-2, gridSize-2);
            });

            // Yemek
            ctx.shadowColor = '#ff00ff';
            ctx.font = '14px Arial';
            ctx.fillText(food.type, food.x * gridSize + 2, food.y * gridSize + 14);

            setTimeout(draw, 120);
        }

        function spawnFood() {
            const rand = Math.random();
            let sum = 0;
            const item = FOODS.find(f => (sum += f.c) > rand) || FOODS[0];
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount),
                type: item.t,
                score: item.s
            };
        }

        function changeDir(nx, ny) {
            if ((nx === -dx && nx !== 0) || (ny === -dy && ny !== 0)) return;
            dx = nx; dy = ny;
        }

        function gameOver() {
            gameRunning = false;
            overSound.play();
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            dx = 0; dy = 0; score = 0;
            scoreEl.innerText = "0";
            gameRunning = true;
            document.getElementById('gameOverScreen').classList.add('hidden');
            spawnFood();
            draw();
        }

        spawnFood();
        draw();
    </script>
</body>
</html>
